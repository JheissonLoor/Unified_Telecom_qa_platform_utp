name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: telecom_qa
          POSTGRES_USER: telecom_app
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telecom_app -d telecom_qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://telecom_app:ci-postgres-password@127.0.0.1:5432/telecom_qa
      JWT_SECRET: ci-jwt-secret-with-at-least-thirty-two-characters
      PROVISIONING_TOKEN: ci-provisioning-token-with-thirty-two-characters
      DEMO_AGENT_PASSWORD: AgentPass123!
      DEMO_AGENT2_PASSWORD: AgentPass456!
      DEMO_SUPERVISOR_PASSWORD: SupervisorPass123!
      DEMO_ADMIN_PASSWORD: AdminPass123!
      WEBRTC_2001_SECRET: WebRtcPass2001!
      WEBRTC_2002_SECRET: WebRtcPass2002!
      TURN_PASSWORD: TurnPass123!
      ASTERISK_HOST: 127.0.0.1
      RECORDINGS_DIR: /tmp/recordings
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Generate ephemeral encryption key
        run: python -c "from cryptography.fernet import Fernet; print('APP_ENCRYPTION_KEY=' + Fernet.generate_key().decode())" >> "$GITHUB_ENV"
      - run: mkdir -p /tmp/recordings
      - run: >-
          python -m pytest tests -q
          --cov=app
          --cov-config=.coveragerc
          --cov-report=term-missing
          --cov-fail-under=80

  repository:
    name: Repository and Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Verify repository security controls
        shell: pwsh
        run: |
          ./tests/security/verify_repository.ps1
          Remove-Item .env
