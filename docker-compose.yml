name: unified-telecom-qa-asterik

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: telecom_qa
      POSTGRES_USER: telecom_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run scripts/bootstrap.ps1 first}
      MIDPOINT_DB_PASSWORD: ${MIDPOINT_DB_PASSWORD:?Run scripts/bootstrap.ps1 first}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom_app -d telecom_qa"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt: ["no-new-privileges:true"]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://telecom_app:${POSTGRES_PASSWORD}@postgres:5432/telecom_qa
      JWT_SECRET: ${JWT_SECRET:?Run scripts/bootstrap.ps1 first}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-15}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Run scripts/bootstrap.ps1 first}
      PROVISIONING_TOKEN: ${PROVISIONING_TOKEN:?Run scripts/bootstrap.ps1 first}
      DEMO_AGENT_PASSWORD: ${DEMO_AGENT_PASSWORD:?Run scripts/bootstrap.ps1 first}
      DEMO_AGENT2_PASSWORD: ${DEMO_AGENT2_PASSWORD:?Run scripts/bootstrap.ps1 first}
      DEMO_SUPERVISOR_PASSWORD: ${DEMO_SUPERVISOR_PASSWORD:?Run scripts/bootstrap.ps1 first}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:?Run scripts/bootstrap.ps1 first}
      WEBRTC_2001_SECRET: ${WEBRTC_2001_SECRET:?Run scripts/bootstrap.ps1 first}
      WEBRTC_2002_SECRET: ${WEBRTC_2002_SECRET:?Run scripts/bootstrap.ps1 first}
      STUN_URL: stun:localhost:${HOST_TURN_PORT:-3478}
      TURN_URL: turn:localhost:${HOST_TURN_PORT:-3478}
      TURN_TLS_URL: turns:localhost:${HOST_TURN_TLS_PORT:-5349}
      TURN_USER: ${TURN_USER:-webrtc}
      TURN_PASSWORD: ${TURN_PASSWORD:?Run scripts/bootstrap.ps1 first}
      ASTERISK_HOST: asterisk
      ASTERISK_HTTP_PORT: 8088
      RECORDINGS_DIR: /recordings
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - asterisk-recordings:/recordings:ro
    networks: [application, data, voice]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks: [application]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  asterisk:
    build:
      context: ./infrastructure/asterisk
      args:
        ASTERISK_VERSION: ${ASTERISK_VERSION:-22.10.0}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run scripts/bootstrap.ps1 first}
      SIP_1001_SECRET: ${SIP_1001_SECRET:?Run scripts/bootstrap.ps1 first}
      SIP_1002_SECRET: ${SIP_1002_SECRET:?Run scripts/bootstrap.ps1 first}
      WEBRTC_2001_SECRET: ${WEBRTC_2001_SECRET:?Run scripts/bootstrap.ps1 first}
      WEBRTC_2002_SECRET: ${WEBRTC_2002_SECRET:?Run scripts/bootstrap.ps1 first}
      ASTERISK_EXTERNAL_ADDRESS: ${ASTERISK_EXTERNAL_ADDRESS:-}
      ASTERISK_LOCAL_NET: ${ASTERISK_LOCAL_NET:-}
      HOST_SIP_UDP_PORT: ${HOST_SIP_UDP_PORT:-5060}
      HOST_RTP_START: ${HOST_RTP_START:-10000}
      HOST_RTP_END: ${HOST_RTP_END:-10100}
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "${HOST_SIP_UDP_PORT:-5060}:5060/udp"
      - "${HOST_SIP_TLS_PORT:-5061}:5061/tcp"
      - "${HOST_RTP_START:-10000}-${HOST_RTP_END:-10100}:${HOST_RTP_START:-10000}-${HOST_RTP_END:-10100}/udp"
    volumes:
      - asterisk-certs:/etc/asterisk/certs
      - asterisk-recordings:/var/spool/asterisk/monitor
      - ./infrastructure/asterisk/generated:/etc/asterisk/generated
    networks: [voice, data]
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core waitfullybooted"]
      interval: 15s
      timeout: 8s
      retries: 12
      start_period: 30s
    security_opt: ["no-new-privileges:true"]

  coturn:
    build: ./infrastructure/coturn
    restart: unless-stopped
    environment:
      TURN_REALM: ${TURN_REALM:-localhost}
      TURN_USER: ${TURN_USER:-webrtc}
      TURN_PASSWORD: ${TURN_PASSWORD:?Run scripts/bootstrap.ps1 first}
    ports:
      - "${HOST_TURN_PORT:-3478}:3478/tcp"
      - "${HOST_TURN_PORT:-3478}:3478/udp"
      - "${HOST_TURN_TLS_PORT:-5349}:5349/tcp"
      - "${HOST_TURN_TLS_PORT:-5349}:5349/udp"
      - "${HOST_TURN_RELAY_START:-49160}-${HOST_TURN_RELAY_END:-49200}:49160-49200/udp"
    volumes:
      - coturn-certs:/etc/coturn/certs
    networks: [voice]
    security_opt: ["no-new-privileges:true"]

  midpoint-init:
    image: evolveum/midpoint:4.9.1-alpine
    restart: "no"
    working_dir: /opt/midpoint
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! /opt/midpoint/bin/ninja.sh -B info; then
          /opt/midpoint/bin/ninja.sh -B run-sql --create
          /opt/midpoint/bin/ninja.sh -B run-sql --mode AUDIT --create
          /opt/midpoint/bin/ninja.sh -B run-sql --scripts /opt/midpoint/objects/drop-superuser.sql
        fi
        /opt/midpoint/bin/ninja.sh -B initial-objects --force-add \
          --oid 00000000-0000-0000-0000-000000000002 --reverse-oid-filter
    environment: &midpoint-repository
      MP_SET_midpoint_repository_database: postgresql
      MP_SET_midpoint_repository_jdbcUrl: jdbc:postgresql://postgres:5432/midpoint
      MP_SET_midpoint_repository_jdbcUsername: midpoint
      MP_SET_midpoint_repository_jdbcPassword: ${MIDPOINT_DB_PASSWORD:?Run scripts/bootstrap.ps1 first}
      MP_SET_midpoint_repository_missingSchemaAction: create
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - midpoint-home:/opt/midpoint/var
      - ./infrastructure/midpoint/objects:/opt/midpoint/objects:ro
    networks: [data]
    security_opt: ["no-new-privileges:true"]

  midpoint:
    image: evolveum/midpoint:4.9.1-alpine
    restart: unless-stopped
    environment:
      <<: *midpoint-repository
      MP_SET_midpoint_administrator_initialPassword: ${MIDPOINT_ADMIN_PASSWORD:?Run scripts/bootstrap.ps1 first}
      MP_MEM_MAX: 2048m
      MP_MEM_INIT: 1024m
    depends_on:
      midpoint-init: { condition: service_completed_successfully }
    ports:
      - "${HOST_MIDPOINT_PORT:-8080}:8080"
    volumes:
      - midpoint-home:/opt/midpoint/var
      - ./infrastructure/midpoint/objects:/opt/midpoint/objects:ro
    networks: [edge, application, data]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/midpoint/ || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 20
      start_period: 90s
    security_opt: ["no-new-privileges:true"]

  nginx:
    build: ./infrastructure/nginx
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_healthy }
      asterisk: { condition: service_healthy }
    ports:
      - "${HOST_HTTP_PORT:-80}:8080"
      - "${HOST_HTTPS_PORT:-443}:8443"
    volumes:
      - nginx-certs:/etc/nginx/certs
    networks: [edge, application, voice]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:8443/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  sonarqube:
    image: sonarqube:lts-community
    restart: unless-stopped
    profiles: ["qa"]
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "${HOST_SONAR_PORT:-9000}:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
    networks: [edge, application]

networks:
  edge: {}
  application: { internal: true }
  data: { internal: true }
  voice: {}

volumes:
  postgres-data: {}
  midpoint-home: {}
  asterisk-certs: {}
  asterisk-recordings: {}
  coturn-certs: {}
  nginx-certs: {}
  sonarqube-data: {}
  sonarqube-logs: {}
