sonar.projectKey=unified-telecom-qa
sonar.projectName=Unified Telecom QA Platform
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8
sonar.sources=backend/app,frontend/src,scripts
sonar.tests=backend/tests,tests,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,backend/tests/**,tests/**
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/reports/**
sonar.coverage.exclusions=scripts/**
sonar.python.version=3.12
sonar.typescript.tsconfigPaths=frontend/tsconfig.sonar.json
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=reports/test-results/backend-coverage.xml
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
